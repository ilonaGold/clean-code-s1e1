<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Todo App</title>
    <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet">
    <link rel="stylesheet" href="style.css" media="screen" charset="utf-8">
  </head>
  <body>
    <header class="matrix">
      <img src="./eisenhower-matrix.jpg" alt="Eisenhower Matrix">
      <a class="more-info" href="https://goal-life.com/page/method/matrix-eisenhower">Want more details?</a>
    </header>
    <main class="main" role="main">
      <section id="add-card" role="form">
        <label for="new-task">Add Item</label>
        <div class="add-card-wrapper">
          <input id="new-task" class="task" type="text">
          <button role="button">Add</button>
        </div>
      </section>
      <section id="tasks" role="region">
        <h2>Todo</h2>
        <ul id="incomplete-tasks">
          <li class="task-item">
            <input type="checkbox">
            <label class="task">Pay Bills</label>
            <input type="text" class="task">
            <button class="edit" role="button">Edit</button>
            <button class="delete" role="button">
              <img src="./remove.svg" alt="Delete">
            </button>
          </li>
          <li class="task-item edit-mode">
            <input type="checkbox">
            <label class="task">Go Shopping</label>
            <input type="text" value="Go Shopping" class="task">
            <button class="edit" role="button">Save</button>
            <button class="delete" role="button">
              <img src="./remove.svg" alt="Delete">
            </button>
          </li>
        </ul>
        <h2>Completed</h2>
        <ul id="completed-tasks">
          <li class="task-item">
            <input type="checkbox" checked>
            <label class="task">See the Doctor</label>
            <input type="text" class="task">
            <button class="edit" role="button">Edit</button>
            <button class="delete" role="button">
              <img src="./remove.svg" alt="Delete">
            </button>
          </li>
        </ul>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
