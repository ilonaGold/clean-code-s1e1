<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Todo App</title>
    <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet">
    <link rel="stylesheet" href="style.css" media="screen" charset="utf-8">
  </head>
  <body class="page">
    <header class="header">
      <img class="header__image" src="./eisenhower-matrix.jpg" alt="Eisenhower Matrix">
      <a class="header__link" href="https://goal-life.com/page/method/matrix-eisenhower">Want more details?</a>
    </header>
    <main class="todo" role="main">
      <section class="todo__add-card" role="form">
        <label for="new-task" class="todo__label">Add Item</label>
        <div class="todo__wrapper">
          <input id="new-task" class="todo__input" type="text">
          <button class="todo__button" role="button">Add</button>
        </div>
      </section>
      <section class="todo__tasks" role="region">
        <h2 class="todo__heading">Todo</h2>
        <ul id="incomplete-tasks" class="todo__list">
          <li class="todo__item">
            <input class="todo__checkbox" type="checkbox">
            <label class="todo__task">Pay Bills</label>
            <input type="text" class="todo__task">
            <button class="todo__button todo__button--edit" role="button">Edit</button>
            <button class="todo__button todo__button--delete" role="button">
              <img class="todo__icon" src="./remove.svg" alt="Delete">
            </button>
          </li>
          <li class="todo__item todo__item--edit">
            <input type="checkbox" class="todo__checkbox">
            <label class="todo__task">Go Shopping</label>
            <input type="text" value="Go Shopping" class="todo__task">
            <button class="todo__button todo__button--edit" role="button">Save</button>
            <button class="todo__button todo__button--delete" role="button">
              <img class="todo__icon" src="./remove.svg" alt="Delete">
            </button>
          </li>
        </ul>
        <h2 class="todo__heading">Completed</h2>
        <ul id="completed-tasks" class="todo__list">
          <li class="todo__item">
            <input type="checkbox" checked class="todo__checkbox">
            <label class="todo__task">See the Doctor</label>
            <input type="text" class="todo__task">
            <button class="todo__button todo__button--edit" role="button">Edit</button>
            <button class="todo__button todo__button--delete" role="button">
              <img class="todo__icon" src="./remove.svg" alt="Delete">
            </button>
          </li>
        </ul>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
